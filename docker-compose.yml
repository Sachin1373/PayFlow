services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
      POSTGRES_DB: payflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DB_URL: postgres://payflow:payflow@postgres:5432/payflow?sslmode=disable
      APP_PORT: "8080"
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
